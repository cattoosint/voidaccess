# Alembic configuration for VoidAccess.
# Run all alembic commands from the voidaccess/ directory.
#
# Common commands:
#   alembic upgrade head          — apply all pending migrations
#   alembic downgrade -1          — roll back one migration
#   alembic revision --autogenerate -m "describe change"  — generate a new migration
#   alembic history               — list applied migrations

[alembic]
script_location = db/migrations
prepend_sys_path = .
file_template = %%(rev)s_%%(slug)s
timezone = UTC

# sqlalchemy.url is intentionally NOT set here.
# It is loaded from the DATABASE_URL environment variable inside db/migrations/env.py.
# This prevents credentials from ever being committed to version control.

[post_write_hooks]
# hooks = black
# black.type = console_scripts
# black.entrypoint = black
# black.options = -l 88

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
